<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E🌙%3C/text%3E%3C/svg%3E" />
<title>장성훈 · 문앤장컨설팅 대표</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  :root{
    --serif: Georgia, "Times New Roman", serif;
    --kr: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;

    /* dark (default) — ink ground, champagne brass */
    --ground:#0C1316;
    --surface:#14201F;
    --surface-2:#0F1A1B;
    --line:rgba(203,168,94,0.22);
    --line-soft:rgba(203,168,94,0.12);
    --ink:#EAEDE7;
    --ink-mute:#93A19B;
    --brass:#CBA85E;
    --brass-strong:#E1C88C;
    --shadow:0 30px 70px -30px rgba(0,0,0,.7), 0 1px 0 rgba(225,200,140,.06) inset;
    --radius:20px;
  }
  @media (prefers-color-scheme: light){
    :root{
      --ground:#E5E8E2;
      --surface:#FBFCF9;
      --surface-2:#F0F3ED;
      --line:rgba(118,94,38,0.30);
      --line-soft:rgba(118,94,38,0.14);
      --ink:#17211D;
      --ink-mute:#5B6862;
      --brass:#8C6C24;
      --brass-strong:#725819;
      --shadow:0 26px 54px -30px rgba(40,34,14,.38), 0 1px 0 rgba(255,255,255,.65) inset;
    }
  }
  :root[data-theme="dark"]{
    --ground:#0C1316; --surface:#14201F; --surface-2:#0F1A1B;
    --line:rgba(203,168,94,0.22); --line-soft:rgba(203,168,94,0.12);
    --ink:#EAEDE7; --ink-mute:#93A19B; --brass:#CBA85E; --brass-strong:#E1C88C;
    --shadow:0 30px 70px -30px rgba(0,0,0,.7), 0 1px 0 rgba(225,200,140,.06) inset;
  }
  :root[data-theme="light"]{
    --ground:#E5E8E2; --surface:#FBFCF9; --surface-2:#F0F3ED;
    --line:rgba(118,94,38,0.30); --line-soft:rgba(118,94,38,0.14);
    --ink:#17211D; --ink-mute:#5B6862; --brass:#8C6C24; --brass-strong:#725819;
    --shadow:0 26px 54px -30px rgba(40,34,14,.38), 0 1px 0 rgba(255,255,255,.65) inset;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    min-height:100dvh;
    background:
      radial-gradient(130% 90% at 50% -12%, rgba(203,168,94,0.10), transparent 60%),
      var(--ground);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    display:grid;
    place-items:center;
    padding:28px 18px calc(28px + env(safe-area-inset-bottom));
  }

  .card{
    position:relative;
    width:100%;
    max-width:392px;
    background:linear-gradient(180deg, var(--surface), var(--surface-2));
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:30px 26px 26px;
    overflow:hidden;
  }
  @media (prefers-reduced-motion: no-preference){
    .card{ animation:rise .7s cubic-bezier(.2,.7,.2,1) both; }
    @keyframes rise{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:none; } }
  }
  .card::before{ /* brass light on the metal plate */
    content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(80% 42% at 50% 0%, rgba(225,200,140,.10), transparent 70%);
  }

  .head{ display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center; }
  .mark{ color:var(--brass-strong); line-height:0; }
  .mark svg{ display:block; }
  .eyebrow{
    margin:0; font-family:var(--serif); font-style:italic;
    font-size:14px; letter-spacing:.02em; color:var(--brass);
  }
  .org{ margin:0; font-family:var(--kr); font-size:13px; color:var(--ink-mute); letter-spacing:.14em; }

  .identity{ text-align:center; margin:22px 0 20px; }
  .name{
    margin:0; font-family:var(--kr); font-weight:700;
    font-size:39px; line-height:1.06; letter-spacing:.06em; color:var(--ink);
    text-wrap:balance;
  }
  .latin{ margin:7px 0 0; font-family:var(--serif); font-style:italic; font-size:15px; color:var(--ink-mute); }
  .title{
    margin:12px 0 0; font-family:var(--sans); font-size:11.5px; font-weight:600;
    text-transform:uppercase; letter-spacing:.22em; color:var(--brass);
  }

  .rule{ border:none; height:1px; margin:4px 2px 22px;
    background:linear-gradient(90deg, transparent, var(--line), transparent); }

  .qr-wrap{ margin:0 0 22px; display:flex; flex-direction:column; align-items:center; gap:14px; }
  .qr-plate{
    appearance:none; border:1px solid rgba(0,0,0,.08); margin:0; cursor:zoom-in;
    background:#fff; border-radius:16px; padding:15px;
    box-shadow:0 10px 26px -14px rgba(0,0,0,.5);
    line-height:0; transition:transform .18s ease, box-shadow .18s ease;
  }
  .qr-plate:hover{ transform:translateY(-2px); box-shadow:0 16px 32px -16px rgba(0,0,0,.55); }
  .qr-plate img{ display:block; width:214px; height:214px; border-radius:6px; }
  .qr-cap{ text-align:center; display:flex; flex-direction:column; gap:4px; }
  .qr-cap-main{ font-family:var(--kr); font-size:13.5px; color:var(--ink); font-weight:600; }
  .qr-cap-sub{ font-family:var(--kr); font-size:11.5px; color:var(--ink-mute); letter-spacing:.01em; }

  .actions{ display:flex; flex-direction:column; gap:9px; }
  .btn{
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    text-decoration:none; color:var(--ink);
    background:var(--surface-2); border:1px solid var(--line-soft);
    border-radius:13px; padding:13px 16px;
    transition:border-color .16s ease, transform .16s ease, background .16s ease;
  }
  .btn:hover{ border-color:var(--brass); transform:translateY(-1px); }
  .btn-k{ font-family:var(--kr); font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.16em; color:var(--brass); flex:none; }
  .btn-v{ font-family:var(--sans); font-size:13.5px; color:var(--ink);
    text-align:right; word-break:break-all; font-variant-numeric:tabular-nums; }
  .btn-primary{ background:var(--brass); border-color:var(--brass); justify-content:center; }
  .btn-primary .btn-save{ font-family:var(--kr); font-size:14px; font-weight:700; color:#160f04; letter-spacing:.02em; }
  .btn-primary:hover{ background:var(--brass-strong); border-color:var(--brass-strong); }

  a:focus-visible, button:focus-visible{ outline:2px solid var(--brass-strong); outline-offset:3px; }

  .foot{ margin:20px 2px 0; text-align:center; font-family:var(--kr);
    font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-mute); opacity:.75; }

  /* zoom overlay */
  .zoom{ position:fixed; inset:0; z-index:9; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px; padding:24px;
    background:rgba(6,10,11,.92); cursor:zoom-out; }
  .zoom[hidden]{ display:none; }
  .zoom img{ width:min(78vw, 78vh); height:auto; background:#fff; padding:18px; border-radius:18px; }
  .zoom p{ margin:0; font-family:var(--kr); font-size:13px; letter-spacing:.14em; color:#cfd6d1; text-transform:uppercase; }
</style>
</head>
